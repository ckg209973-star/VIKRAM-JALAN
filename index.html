<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(180deg,#ff2a7f,#c0005a);
}

.card{
    width:90%;
    max-width:400px;
    background: linear-gradient(180deg,#7a003f,#4a0027);
    padding:40px 20px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.title{
    font-size:32px;
    font-weight:bold;
    letter-spacing:4px;
    color:#00e5ff;
}

.subtitle{
    margin-top:10px;
    color:#ddd;
    font-size:18px;
}

.timer{
    font-size:80px;
    color:#ffc400;
    font-weight:bold;
    margin:20px 0 10px;
}

.seconds-text{
    color:#eee;
    font-size:22px;
    margin-bottom:25px;
}

.join-btn{
    display:inline-block;
    padding:18px 30px;
    border-radius:50px;
    background: linear-gradient(90deg,#00e5ff,#5b9dff);
    color:#000;
    font-weight:bold;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.join-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00e5ff;
}

.stay-text{
    margin-top:25px;
    color:#ddd;
    font-size:16px;
}

.ads-box{
    margin-top:25px;
    padding:12px;
    border-radius:15px;
    background:#5a0032;
    font-size:16px;
    text-align:center;
}

.ads-box a{
    color:#00e5ff;
    font-weight:bold;
    text-decoration:none;
}

.ads-box a:hover{
    text-decoration:underline;
}
</style>

<body>

<div class="card">
    <div class="title">VIKRAM JALAN</div>
    <div class="subtitle">Official Telegram Channel</div>

    <div class="timer" id="countdown">10</div>
    <div class="seconds-text">Seconds Left</div>

    <a href="https://t.me/+B84Y1PQZEtFkZjY1" target="_blank" class="join-btn">
        JOIN TELEGRAM CHANNEL
    </a>

    <div class="stay-text">
        Stay connected with VIKRAM JALAN
    </div>

    <div class="ads-box">
        <a href="https://t.me/+_ldYCcyc-qwwODU1" target="_blank">
            Ads By Ck Ads Agancy
        </a>
    </div>
</div>

<script>
let timeLeft = 10;
const countdown = document.getElementById("countdown");

const timer = setInterval(() => {
    if(timeLeft > 0){
        timeLeft--;
        countdown.innerText = timeLeft;
    } else {
        clearInterval(timer);
    }
}, 1000);
</script>

</body>
