<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #cfd9df, #e2ebf0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: #fff;
    width: 90%;
    max-width: 380px;
    padding: 30px 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

/* Title */
.title {
    font-size: 26px;
    font-weight: 800;
    color: #1d2630;
    margin-bottom: 10px;
}

/* Subscribers */
.subs {
    color: #6c7a89;
    font-size: 16px;
    margin-bottom: 20px;
}

/* Description */
.desc {
    color: #555;
    font-size: 15px;
    margin-bottom: 15px;
}

/* Telegram hint */
.telegram {
    color: #6fa3ff;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 16px 25px;
    background: linear-gradient(135deg, #2fa4d7, #1e88e5);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.2s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* Hover */
.btn:hover {
    transform: scale(0.97);
}

/* Click zoom-out */
.btn:active {
    transform: scale(0.90);
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #999;
}
</style>
